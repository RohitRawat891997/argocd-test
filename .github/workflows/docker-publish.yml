# CI for Web Service

name: advancer-awar-ci

on: 
    pull_request:
        branches:
        - main

jobs:


    docker:
        runs-on: ubuntu-latest

        steps:
        - name: checkout code
          uses: actions/checkout@v4

        - name: Install Docker
          uses: docker/setup-buildx-action@v1
        
        - name: Login to Docker
          uses: docker/login-action@v3
          with:
            username: ${{ secrets.DOCKER_USERNAME }}
            password: ${{ secrets.DOCKER_TOKEN }}

        - name: Docker Push
          uses: docker/build-push-action@v6
          with:
            context: demo-path/
            file: demo-path/Dockerfile
            push: true
            tags: ${{ secrets.DOCKER_USERNAME }}/nginx:${{github.run_id}}



    updatek8s:
        runs-on: ubuntu-latest

        needs: docker

        steps:
        - name: checkout code
          uses: actions/checkout@v4
          with:
            token: ${{ secrets.MY_TOKEN }}

        - name: Update tag in kubernetes deployment manifest
          run: | 
               sed -i "s|image: .*|image: ${{ secrets.DOCKER_USERNAME }}/nginx:${{github.run_id}}|" demo-path/web-deployment.yaml
        
        - name: Commit and push changes
          run: |
            git config --global user.email "rohitrawat891997"
            git config --global user.name "Rohit Rawat"
            git add demo-path/web-deployment.yaml
            git commit -m "[CI]: Update nginx image tag"
            git push origin HEAD:main
